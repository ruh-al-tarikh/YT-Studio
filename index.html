<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YT Studio | Cinematic Video Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ruh Al Tarikh</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- BACKGROUND -->
  <div id="bg"></div>

  <!-- HEADER -->
  <header class="header">
    <h1>🎬 Ruh Al Tarikh</h1>
  </header>

  <!-- HERO -->
  <section id="hero" class="hero">
    <div class="hero-overlay">
      <h1 id="hero-title">Loading episodes...</h1>
      <button id="hero-btn">▶ Watch</button>
    </div>
  </section>

  <!-- GRID -->
  <h2 class="section">Episodes</h2>
  <div id="grid" class="grid"></div>

  <!-- MODAL -->
  <div id="modal" class="modal">
    <div class="modal-box">
      <span id="close">×</span>
      <iframe id="player" allow="autoplay; encrypted-media" allowfullscreen></iframe>
      <h2 id="video-title"></h2>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
