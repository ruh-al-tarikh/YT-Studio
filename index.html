<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ruh Al Tarikh</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

  <div id="bg"></div>

  <header class="header">
    <h1>🎬 Ruh Al Tarikh</h1>
  </header>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-overlay">
      <h1 id="hero-title">Loading...</h1>
      <button id="hero-btn">▶ Watch Now</button>
    </div>
  </section>

  <!-- ⭐ CONTINUE WATCHING -->
  <h2 class="section">Continue Watching</h2>
  <div id="continue-row" class="row"></div>

  <!-- 📺 ALL EPISODES -->
  <h2 class="section">Episodes</h2>
  <div id="grid" class="grid"></div>

  <!-- 🎥 HOVER PREVIEW -->
  <iframe id="hover-preview"></iframe>

  <!-- MODAL -->
  <div id="modal" class="modal">
    <div class="modal-box">
      <span id="close">×</span>
      <iframe id="player" allow="autoplay; encrypted-media" allowfullscreen></iframe>
      <h2 id="video-title"></h2>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
