<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ruh Al Tarikh</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- 🌫 BACKGROUND -->
  <div id="bg"></div>

  <!-- HEADER -->
  <header class="header">
    <h1>🎬 Ruh Al Tarikh</h1>
  </header>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-overlay">
      <h1 id="hero-title">Loading...</h1>
      <button id="hero-btn">▶ Watch</button>
    </div>
  </section>

  <!-- PREVIEW PLAYER (SMART HOVER) -->
  <iframe id="hover-preview"></iframe>

  <!-- GRID -->
  <h2 class="section">Episodes</h2>
  <div id="grid" class="grid"></div>

  <!-- MODAL -->
  <div id="modal" class="modal">
    <div class="modal-box">
      <span id="close">×</span>
      <iframe id="player" allow="autoplay; encrypted-media" allowfullscreen></iframe>
      <h2 id="video-title"></h2>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
