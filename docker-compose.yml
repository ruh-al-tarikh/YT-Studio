version: '3.8'

services:
  # Frontend - Nginx static + SPA
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yt-studio-web
    ports:
      - "8080:80"
    environment:
      - NGINX_HOST=localhost
      - NGINX_PORT=80
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./js:/usr/share/nginx/html/js:ro
      - ./css:/usr/share/nginx/html/css:ro
      - ./public:/usr/share/nginx/html/public:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - app-network

  # Backend - Cloudflare Workers (local dev with wrangler)
  api:
    build:
      context: ./yt-studio-api
      dockerfile: Dockerfile
    container_name: yt-studio-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
    volumes:
      - ./yt-studio-api/src:/app/src:ro
      - ./yt-studio-api/server.js:/app/server.js:ro
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
