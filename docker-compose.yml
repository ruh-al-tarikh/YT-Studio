services:
  # Frontend - Nginx static + SPA
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yt-studio-web
    ports:
      - "8080:80"
    environment:
      - NGINX_HOST=localhost
      - NGINX_PORT=80
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./js:/usr/share/nginx/html/js:ro
      - ./css:/usr/share/nginx/html/css:ro
      - ./public:/usr/share/nginx/html/public:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - app-network

  # AI Automation Service
  automation:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yt-studio-automation
    environment:
      - NODE_ENV=production
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    command: npm run enhance
    restart: "no"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
