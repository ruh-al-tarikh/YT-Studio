services:
  # Frontend - Nginx with SPA routing
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yt-studio-web
    ports:
      - "8080:80"
    environment:
      - NODE_ENV=production
    volumes:
      - ./dist:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
