apiVersion: apps/v1
kind: Deployment
metadata:
  name: yt-studio-api
  namespace: default
  annotations:
    circleci.com/project-id: ruhdevops
  labels:
    app: yt-studio-api
    circleci.com/component-name: yt-studio-api
    circleci.com/version: latest
spec:
  replicas: 2
  selector:
    matchLabels:
      app: yt-studio-api
  template:
    metadata:
      labels:
        app: yt-studio-api
        circleci.com/component-name: yt-studio-api
        circleci.com/version: latest
    spec:
      containers:
      - name: yt-studio-api
        image: ghcr.io/ruhdevops/yt-studio:latest
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3000"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: yt-studio-api-service
  namespace: default
  labels:
    circleci.com/component-name: yt-studio-api
spec:
  selector:
    app: yt-studio-api
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
  type: ClusterIP
