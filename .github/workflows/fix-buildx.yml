name: Fix Docker Buildx Configuration

on:
  workflow_dispatch:  # Run this manually from GitHub Actions tab

jobs:
  fix-buildx:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Remove Docker Build Cloud configuration from CI workflow
        run: |
          # Find the workflow file that contains the docker-build-push-action
          WORKFLOW_FILE=$(grep -l "docker/build-push-action" .github/workflows/*.yml | head -1)
          
          if [ -z "$WORKFLOW_FILE" ]; then
            echo "No workflow file with docker/build-push-action found"
            exit 1
          fi
          
          echo "Found workflow file: $WORKFLOW_FILE"
          
          # Create backup
          cp "$WORKFLOW_FILE" "${WORKFLOW_FILE}.backup"
          
          # Remove the cloud driver configuration from setup-buildx-action
          sed -i '/- name: Set up Docker Buildx/,/docker\/setup-buildx-action@v3/!b; /with:/,/cache-from:/s/driver: cloud//;/endpoint:.*synapsexlocal\/ytweb//d' "$WORKFLOW_FILE"
          
          # Alternative fix: comment out the entire driver section using Python (more reliable)
          python3 << EOF
          import re
          with open("$WORKFLOW_FILE", "r") as f:
              content = f.read()
          
          # Pattern to find the setup-buildx-action block and remove cloud driver lines
          pattern = r'( - name: Set up Docker Buildx\n\s+uses: docker/setup-buildx-action@v3\n\s+with:\n)(\s+driver: cloud\n\s+endpoint:.*\n\s+version: latest\n)'
          fixed_content = re.sub(pattern, r'\1\s+version: latest\n', content)
          
          # Also remove the outputs: type=cacheonly for PRs if present (optional)
          # fixed_content = re.sub(r'outputs:.*cacheonly.*\n', '', fixed_content)
          
          with open("$WORKFLOW_FILE", "w") as f:
              f.write(fixed_content)
          
          print("✓ Removed Docker Build Cloud configuration")
          EOF
          
          echo "✓ Backup saved as ${WORKFLOW_FILE}.backup"

      - name: Commit and push the fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/*.yml
          git diff --staged --quiet || git commit -m "fix: Remove Docker Build Cloud driver to use local Buildx builder"
          git push
          
      - name: Summary
        run: |
          echo "## ✅ Fix Applied" >> $GITHUB_STEP_SUMMARY
          echo "The workflow file has been updated to use the **local Buildx builder** instead of Docker Build Cloud." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next steps:" >> $GITHUB_STEP_SUMMARY
          echo "1. Review the changes in your pull request or directly on the main branch" >> $GITHUB_STEP_SUMMARY
          echo "2. Run your original CI workflow again - it should now work without minute limits" >> $GITHUB_STEP_SUMMARY
          echo "3. If you still want Docker Build Cloud, you'll need to purchase additional minutes at https://build.cloud.docker.com" >> $GITHUB_STEP_SUMMARY