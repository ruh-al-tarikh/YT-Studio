name: Deploy Preview

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: false
        default: 'main'
        type: string
      channel:
        description: 'Preview channel name'
        required: false
        default: 'manual-preview'
        type: string
  pull_request:
    types: [opened, synchronize]

permissions:
  id-token: write
  contents: read

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.event.pull_request.head.ref || 'main' }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      - name: Build project
        run: pnpm run build

      - name: Create firebase.json
        run: |
          cat > firebase.json << 'EOF'
          {
            "hosting": {
              "public": "dist",
              "ignore": ["firebase.json", "**/.*", "**/node_modules/**"],
              "cleanUrls": true,
              "rewrites": [{ "source": "**", "destination": "/index.html" }]
            }
          }
          EOF

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/180228139192/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider"
          service_account: "github-actions-deploy@ytstudio-pr.iam.gserviceaccount.com"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Preview Channel
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            CHANNEL_NAME="${{ github.event.inputs.channel }}"
          else
            CHANNEL_NAME="pr-${{ github.event.number }}"
          fi
          
          echo "📦 Deploying to channel: $CHANNEL_NAME"
          firebase hosting:channel:deploy "$CHANNEL_NAME" --expires 7d --project ytstudio-pr

      - name: Output Preview URL
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            CHANNEL_NAME="${{ github.event.inputs.channel }}"
          else
            CHANNEL_NAME="pr-${{ github.event.number }}"
          fi
          echo "✅ Preview deployed successfully!"
          echo "🔗 Preview URL: https://ytstudio-pr--$CHANNEL_NAME.web.app"
