name: YouTube API Integration

on:
  workflow_dispatch:
    inputs:
      youtube-command:
        description: 'YouTube API Command'
        required: true
        type: choice
        options:
          - 'channel-stats'
          - 'video-stats'
      channel-id:
        description: 'YouTube Channel ID'
        required: false
        type: string
      video-id:
        description: 'YouTube Video ID'
        required: false
        type: string

  issue_comment:
    types: [created]

jobs:
  youtube-api:
    if: contains(github.event.comment.body, '/yt')
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Parse command
        id: parse
        run: |
          BODY="${{ github.event.comment.body }}"
          if echo "$BODY" | grep -qi '/yt channel'; then
            echo "command=channel-stats" >> $GITHUB_OUTPUT
            CHANNEL=$(echo "$BODY" | sed -E 's/.*\/yt channel[[:space:]]+//i' | cut -d' ' -f1)
            echo "channel_id=$CHANNEL" >> $GITHUB_OUTPUT
          elif echo "$BODY" | grep -qi '/yt video'; then
            echo "command=video-stats" >> $GITHUB_OUTPUT
            VIDEO=$(echo "$BODY" | sed -E 's/.*\/yt video[[:space:]]+//i' | cut -d' ' -f1)
            echo "video_id=$VIDEO" >> $GITHUB_OUTPUT
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install YouTube API
        run: pip install google-api-python-client

      - name: Run YouTube API
        id: youtube
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          COMMAND: ${{ steps.parse.outputs.command }}
          CHANNEL_ID: ${{ steps.parse.outputs.channel_id }}
          VIDEO_ID: ${{ steps.parse.outputs.video_id }}
        run: |
          python -c "
import os
from googleapiclient.discovery import build

key = os.environ.get('YOUTUBE_API_KEY')
cmd = os.environ.get('COMMAND', '')
cid = os.environ.get('CHANNEL_ID', '')
vid = os.environ.get('VIDEO_ID', '')
out = '/tmp/result.md'

if not key:
    open(out, 'w').write('❌ API key not configured')
    exit(0)

youtube = build('youtube', 'v3', developerKey=key)

if cmd == 'channel-stats' and cid:
    resp = youtube.channels().list(part='snippet,statistics', id=cid).execute()
    if resp['items']:
        c = resp['items'][0]
        s = c['statistics']
        r = f\"\"\"## 📊 Channel Stats

**Channel:** {c['snippet']['title']}
**Subscribers:** {int(s.get('subscriberCount',0)):,}
**Views:** {int(s.get('viewCount',0)):,}
**Videos:** {s.get('videoCount',0)}
\"\"\"
    else:
        r = f'❌ Channel not found: {cid}'
elif cmd == 'video-stats' and vid:
    resp = youtube.videos().list(part='snippet,statistics', id=vid).execute()
    if resp['items']:
        v = resp['items'][0]
        s = v['statistics']
        r = f\"\"\"## 📹 Video Stats

**Title:** {v['snippet']['title']}
**Views:** {int(s.get('viewCount',0)):,}
**Likes:** {int(s.get('likeCount',0)):,}
\"\"\"
    else:
        r = f'❌ Video not found: {vid}'
else:
    r = '❌ Invalid command. Use: /yt channel CHANNEL_ID or /yt video VIDEO_ID'

open(out, 'w').write(r)
print(r)
"
          echo "result<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/result.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post comment
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: ${{ steps.youtube.outputs.result }}
            });
