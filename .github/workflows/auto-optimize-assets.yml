name: 🖼️ Auto-Optimize Assets

on:
  schedule:
    - cron: '0 2 * * 0'  # Weekly on Sunday at 2 AM
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  optimize:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install optimization tools
        run: |
          sudo apt-get update
          sudo apt-get install -y optipng jpegoptim
          npm install -g uglify-js csso-cli 2>/dev/null || true

      - name: Optimize Images
        run: |
          echo "## 🖼️ Image Optimization Report" >> optimize-report.md

          # Optimize PNG images
          echo "" >> optimize-report.md
          echo "### PNG Images" >> optimize-report.md
          find . -name "*.png" -type f ! -path "./node_modules/*" | while read img; do
            original=$(stat -c%s "$img" 2>/dev/null || stat -f%z "$img" 2>/dev/null)
            optipng -o7 "$img" 2>/dev/null
            new=$(stat -c%s "$img" 2>/dev/null || stat -f%z "$img" 2>/dev/null)
            savings=$((original - new))
            if [ $savings -gt 0 ]; then
              echo "- ✅ $img: Saved $(($savings/1024))KB" >> optimize-report.md
            fi
          done

          # Optimize JPEG images
          echo "" >> optimize-report.md
          echo "### JPEG Images" >> optimize-report.md
          find . -name "*.jpg" -o -name "*.jpeg" -type f ! -path "./node_modules/*" | while read img; do
            jpegoptim --strip-all "$img" 2>/dev/null
            echo "- ✅ $img optimized" >> optimize-report.md
          done

      - name: Minify CSS and JS
        run: |
          echo "" >> optimize-report.md
          echo "### Code Minification" >> optimize-report.md

          # Minify JavaScript files
          find . -name "*.js" -type f ! -path "./node_modules/*" ! -path "./.github/*" | while read file; do
            if [ ! -f "${file}.min" ]; then
              uglifyjs "$file" -o "$file" --compress --mangle 2>/dev/null && echo "- ✅ Minified: $file" >> optimize-report.md || true
            fi
          done

          # Minify CSS files
          find . -name "*.css" -type f ! -path "./node_modules/*" | while read file; do
            csso "$file" -o "$file" 2>/dev/null && echo "- ✅ Minified: $file" >> optimize-report.md || true
          done

      - name: Check for changes
        id: git-check
        run: |
          git add -A
          if ! git diff --cached --quiet; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "changes_detected=yes" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "changes_detected=no" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.git-check.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "🖼️ Auto-optimize images and assets"
          title: "🤖 Asset Optimization - ${{ github.run_id }}"
          body: |
            ## 🤖 Weekly Asset Optimization

            ### Changes Made:
            - 🖼️ Optimized PNG and JPEG images
            - 📦 Minified JavaScript files
            - 🎨 Minified CSS files

            ### Run Details:
            - **Run ID:** ${{ github.run_id }}
            - **Trigger:** ${{ github.event_name }}
            - **Timestamp:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')

            *Generated by 🤖 Auto-Optimize Workflow*
          branch: auto-optimize/assets-${{ github.run_id }}
          base: main
          labels: automated, optimization, assets
          delete-branch: true

      - name: Summary Report
        if: always()
        run: |
          echo "## ✅ Asset Optimization Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Run Information" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date)" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Changes Detected:** ${{ steps.git-check.outputs.changes_detected }}" >> $GITHUB_STEP_SUMMARY
          if [ -f "optimize-report.md" ]; then
            cat optimize-report.md >> $GITHUB_STEP_SUMMARY
          fi
