name: 🤖 Auto-Enhance Website

on:
  schedule:
    - cron: '0 */6 * * *'
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      enhancement_type:
        description: 'Type of enhancement to run'
        required: true
        default: 'all'
        type: choice
        options:
          - 'all'
          - 'performance'
          - 'seo'
          - 'accessibility'

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  enhance:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Run Performance Checks
        run: |
          echo "## 🔍 Performance Audit" >> report.md
          
          # Check image sizes
          echo "### Images" >> report.md
          find . -name "*.png" -o -name "*.jpg" -o -name "*.jpeg" | while read img; do
            size=$(du -k "$img" 2>/dev/null | cut -f1)
            if [ "$size" -gt 100 ]; then
              echo "- ⚠️ Large: $img (${size}KB)" >> report.md
            fi
          done
          
      - name: Run SEO Checks
        run: |
          echo "" >> report.md
          echo "## 🔍 SEO Audit" >> report.md
          
          # Check meta tags
          if grep -q '<meta name="description"' index.html 2>/dev/null; then
            echo "- ✅ Meta description found" >> report.md
          else
            echo "- ❌ Missing meta description" >> report.md
            sed -i 's/<head>/<head>\n  <meta name="description" content="YT Studio - Islamic history and Quranic mysteries">/' index.html
          fi
          
      - name: Apply Auto-Fixes
        run: |
          # Add lazy loading to images
          sed -i 's/<img /<img loading="lazy" /g' index.html 2>/dev/null || true
          echo "✅ Auto-fixes applied" >> report.md
          
      - name: Check for Changes
        id: git-check
        run: |
          git add -A
          if ! git diff --cached --quiet; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi
          
      - name: Create Pull Request
        if: steps.git-check.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "🤖 Auto-enhancement: Website optimizations"
          title: "🤖 Automated Website Enhancement"
          body: |
            ## 🤖 Auto-Generated Enhancement PR
            
            ### Changes Made:
            - ✅ Added lazy loading to images
            - ✅ Added missing meta tags
            - ✅ Formatted code
            - ✅ Performance improvements
            
            ### Schedule:
            This PR was generated automatically.
            
            *Generated by 🤖 Auto-Enhance Workflow*
          branch: auto-enhance/website-updates
          base: main
          labels: automated, enhancement
          delete-branch: true
          signoff: false
          
      - name: Summary
        run: |
          echo "## ✅ Enhancement Complete" >> $GITHUB_STEP_SUMMARY
          echo "- PR created with improvements" >> $GITHUB_STEP_SUMMARY
          echo "- Schedule: Every 6 hours" >> $GITHUB_STEP_SUMMARY
