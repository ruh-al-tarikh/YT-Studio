name: Deploy to Cloudflare Workers

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Ensure Worker file exists
        run: |
          if [ ! -f src/youtube-worker.ts ]; then
            mkdir -p src
            cat > src/youtube-worker.ts << 'EOF'
          /**
           * YouTube API V3 Worker - Cloudflare Worker
           */
          export interface Env {
            YOUTUBE_API_KEY: string;
          }

          export default {
            async fetch(request: Request, env: Env): Promise<Response> {
              const url = new URL(request.url);
              const corsHeaders = {
                'Access-Control-Allow-Origin': '*',
                'Access-Control-Allow-Methods': 'GET, OPTIONS',
                'Access-Control-Allow-Headers': 'Content-Type',
              };

              if (request.method === 'OPTIONS') {
                return new Response(null, { status: 204, headers: corsHeaders });
              }

              if (url.pathname === '/' || url.pathname === '/health') {
                return new Response(
                  JSON.stringify({ status: 'healthy', timestamp: new Date().toISOString() }),
                  { headers: { ...corsHeaders, 'Content-Type': 'application/json' } }
                );
              }

              return new Response(
                JSON.stringify({ error: 'Not found' }),
                { status: 404, headers: { ...corsHeaders, 'Content-Type': 'application/json' } }
              );
            },
          };
          EOF
          fi

      - name: Build Worker
        run: pnpm run build || echo "No build script found, skipping"

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config wrangler.jsonc --env production
          quiet: false

      - name: Deploy to Cloudflare Pages (Optional)
        if: success()
        run: |
          npx wrangler pages deploy dist --project-name=yt-studio --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}