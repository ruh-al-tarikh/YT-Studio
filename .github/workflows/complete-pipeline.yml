name: YT-Studio Complete Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Job 1: Extract configuration from pyproject.toml
  ExtractConfiguration:
    uses: pyTooling/Actions/.github/workflows/ExtractConfiguration.yml@r6
    with:
      package_name: "yt-studio"
  
  # Job 2: Run unit tests across multiple Python versions
  UnitTesting:
    needs: ExtractConfiguration
    uses: pyTooling/Actions/.github/workflows/UnitTesting.yml@r6
    with:
      python_versions: |
        ["3.11", "3.12", "3.13"]
      pytest_enable_coverage: true
      pytest_cov_branch: true
      os: ubuntu-latest
  
  # Job 3: Static type checking with mypy
  StaticTypeCheck:
    needs: ExtractConfiguration
    uses: pyTooling/Actions/.github/workflows/StaticTypeCheck.yml@r6
    with:
      mypy_args: --strict --ignore-missing-imports
  
  # Job 4: Build package (wheel + source)
  Package:
    needs: [UnitTesting, StaticTypeCheck]
    uses: pyTooling/Actions/.github/workflows/Package.yml@r6
    with:
      artifact_name: yt-studio-package
  
  # Job 5: Publish to PyPI (only on tags)
  PublishOnPyPI:
    needs: Package
    if: startsWith(github.ref, 'refs/tags')
    uses: pyTooling/Actions/.github/workflows/PublishOnPyPI.yml@r6
    secrets:
      PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
  
  # Job 6: Publish test results
  PublishTestResults:
    needs: UnitTesting
    uses: pyTooling/Actions/.github/workflows/PublishTestResults.yml@r6
    with:
      report_name: "YT-Studio Test Results"
  
  # Job 7: Cleanup artifacts
  ArtifactCleanup:
    needs: [Package, PublishOnPyPI]
    uses: pyTooling/Actions/.github/workflows/ArtifactCleanup.yml@r6
    if: always()