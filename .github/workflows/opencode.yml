name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    if: |
      github.event.comment.body &&
      (contains(github.event.comment.body, '/oc') ||
       contains(github.event.comment.body, '/opencode'))
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write  # Changed from 'read' to allow PR creation
      pull-requests: write  # Changed from 'read' to allow commenting
      issues: write  # Changed from 'read' to allow commenting
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4  # Changed from v6 (v6 doesn't exist)
        with:
          persist-credentials: false
          fetch-depth: 0  # Fetch all history for better context

      - name: Run opencode
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: qwen/qwen3-6b-plus-free  # Correct provider/model format
