name: opencode

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Prompt for OpenCode'
        required: true
        type: string
      youtube-command:
        description: 'YouTube API Command (optional)'
        required: false
        type: choice
        options:
          - ''
          - 'fetch-analytics'
          - 'get-stats'
      channel-id:
        description: 'YouTube Channel ID (for analytics)'
        required: false
        type: string
      video-id:
        description: 'YouTube Video ID (for stats)'
        required: false
        type: string

  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, '/opencode') ||
      contains(github.event.comment.body, '/youtube')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python for YouTube integration
        if: |
          contains(github.event.comment.body, '/youtube') ||
          contains(github.event.inputs.youtube-command, 'fetch-analytics') ||
          contains(github.event.inputs.youtube-command, 'get-stats')
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install YouTube API dependencies
        if: |
          contains(github.event.comment.body, '/youtube') ||
          contains(github.event.inputs.youtube-command, 'fetch-analytics') ||
          contains(github.event.inputs.youtube-command, 'get-stats')
        run: |
          pip install google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client

      - name: Setup Google Credentials
        if: |
          contains(github.event.comment.body, '/youtube') ||
          contains(github.event.inputs.youtube-command, 'fetch-analytics') ||
          contains(github.event.inputs.youtube-command, 'get-stats')
        run: |
          echo '${{ secrets.GOOGLE_CREDENTIALS }}' > credentials.json
          echo '${{ secrets.YOUTUBE_TOKEN }}' > token_youtube.json
        shell: bash

      - name: Run YouTube API Integration
        id: youtube
        if: |
          contains(github.event.comment.body, '/youtube') ||
          contains(github.event.inputs.youtube-command, 'fetch-analytics') ||
          contains(github.event.inputs.youtube-command, 'get-stats')
        env:
          YOUTUBE_COMMAND: ${{ github.event.inputs.youtube-command || 'fetch-analytics' }}
          YOUTUBE_CHANNEL_ID: ${{ github.event.inputs.channel-id || secrets.YOUTUBE_CHANNEL_ID }}
          YOUTUBE_VIDEO_ID: ${{ github.event.inputs.video-id }}
        run: |
          python .github/scripts/youtube_integration.py
          echo "youtube_result=$(cat /tmp/youtube_result.md)" >> $GITHUB_OUTPUT

      - name: Install OpenCode CLI
        run: |
          curl -fsSL https://opencode.ai/install | bash
          echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Extract clean prompt
        id: extract-prompt
        env:
          RAW_PROMPT: ${{ github.event_name == 'workflow_dispatch' && inputs.prompt || github.event.comment.body }}
        run: |
          # Check if this is a YouTube command
          if echo "$RAW_PROMPT" | grep -qi '/youtube'; then
            CLEAN_PROMPT="YouTube API operation completed. ${{ steps.youtube.outputs.youtube_result }}"
          else
            # Remove command prefixes for OpenCode
            CLEAN_PROMPT=$(echo "$RAW_PROMPT" | sed -E 's/.*\/(oc|opencode)[[:space:]]*//i' | sed -E 's/<[^>]*>//g' | head -1)
            if [ -z "$CLEAN_PROMPT" ]; then
              CLEAN_PROMPT="Please analyze this issue or pull request"
            fi
          fi
          echo "clean_prompt=$CLEAN_PROMPT" >> $GITHUB_OUTPUT

      - name: Run OpenCode
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          opencode run "${{ steps.extract-prompt.outputs.clean_prompt }}" --model opencode/gpt-4o-mini

      - name: Post YouTube results as comment
        if: steps.youtube.outputs.youtube_result != ''
        uses: actions/github-script@v7
        with:
          script: |
            const result = `${{ steps.youtube.outputs.youtube_result }}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: result
            });
