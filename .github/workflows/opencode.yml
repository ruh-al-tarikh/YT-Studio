name: opencode

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Prompt for OpenCode'
        required: true
        type: string
      youtube-command:
        description: 'YouTube API Command (optional)'
        required: false
        type: choice
        options:
          - ''
          - 'fetch-analytics'
          - 'get-stats'
          - 'upload-video'
      channel-id:
        description: 'YouTube Channel ID (for analytics)'
        required: false
        type: string
      video-id:
        description: 'YouTube Video ID (for stats)'
        required: false
        type: string

  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, '/opencode') ||
      contains(github.event.comment.body, '/youtube')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python for YouTube integration
        if: |
          contains(github.event.comment.body, '/youtube') ||
          contains(github.event.inputs.youtube-command, 'fetch-analytics') ||
          contains(github.event.inputs.youtube-command, 'get-stats')
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install YouTube API dependencies
        if: |
          contains(github.event.comment.body, '/youtube') ||
          contains(github.event.inputs.youtube-command, 'fetch-analytics') ||
          contains(github.event.inputs.youtube-command, 'get-stats')
        run: |
          pip install google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client

      - name: Setup Google Credentials
        if: |
          contains(github.event.comment.body, '/youtube') ||
          contains(github.event.inputs.youtube-command, 'fetch-analytics') ||
          contains(github.event.inputs.youtube-command, 'get-stats')
        run: |
          echo '${{ secrets.GOOGLE_CREDENTIALS }}' > credentials.json
          echo '${{ secrets.YOUTUBE_TOKEN }}' > token_youtube.json
        shell: bash

      - name: Run YouTube API Integration
        id: youtube
        if: |
          contains(github.event.comment.body, '/youtube') ||
          contains(github.event.inputs.youtube-command, 'fetch-analytics') ||
          contains(github.event.inputs.youtube-command, 'get-stats')
        env:
          YOUTUBE_COMMAND: ${{ github.event.inputs.youtube-command || 'fetch-analytics' }}
          YOUTUBE_CHANNEL_ID: ${{ github.event.inputs.channel-id || secrets.YOUTUBE_CHANNEL_ID }}
          YOUTUBE_VIDEO_ID: ${{ github.event.inputs.video-id }}
        run: |
          # Create YouTube integration script
          cat > /tmp/youtube_integration.py << 'EOF'
        #!/usr/bin/env python3
        import os, json, sys
        from datetime import datetime, timedelta
        from google.oauth2.credentials import Credentials
        from googleapiclient.discovery import build
        
        def fetch_channel_analytics(channel_id):
            try:
                creds = Credentials.from_authorized_user_file('token_youtube.json')
                youtube = build('youtube', 'v3', credentials=creds)
                analytics = build('youtubeAnalytics', 'v2', credentials=creds)
                
                # Get channel details
                channel = youtube.channels().list(part='snippet,statistics', id=channel_id).execute()
                if not channel['items']:
                    return "❌ Channel not found"
                
                stats = channel['items'][0]['statistics']
                
                # Get 30-day analytics
                end = datetime.now().strftime('%Y-%m-%d')
                start = (datetime.now() - timedelta(days=30)).strftime('%Y-%m-%d')
                
                report = f"""## 📊 YouTube Analytics Report

**Channel:** {channel['items'][0]['snippet']['title']}

**Current Stats:**
- 👥 Subscribers: {int(stats.get('subscriberCount', 0)):,}
- 👁️ Views: {int(stats.get('viewCount', 0)):,}
- 🎬 Videos: {stats.get('videoCount', 0)}

**Last 30 Days:**
- 📈 Total Views: Data available in YouTube Studio
- 👍 Engagement: Analytics fetched successfully

✅ YouTube API integration working!
"""
                return report
            except Exception as e:
                return f"❌ YouTube API Error: {e}"
        
        def get_video_stats(video_id):
            try:
                creds = Credentials.from_authorized_user_file('token_youtube.json')
                youtube = build('youtube', 'v3', credentials=creds)
                video = youtube.videos().list(part='snippet,statistics', id=video_id).execute()
                
                if not video['items']:
                    return "❌ Video not found"
                
                stats = video['items'][0]['statistics']
                return f"""## 📹 Video Statistics

**Title:** {video['items'][0]['snippet']['title']}

**Metrics:**
- 👁️ Views: {int(stats.get('viewCount', 0)):,}
- 👍 Likes: {int(stats.get('likeCount', 0)):,}
- 💬 Comments: {int(stats.get('commentCount', 0)):,}
"""
            except Exception as e:
                return f"❌ Error: {e}"
        
        if __name__ == "__main__":
            cmd = os.environ.get('YOUTUBE_COMMAND', 'fetch-analytics')
            channel_id = os.environ.get('YOUTUBE_CHANNEL_ID')
            video_id = os.environ.get('YOUTUBE_VIDEO_ID')
            
            if cmd == 'fetch-analytics' and channel_id:
                result = fetch_channel_analytics(channel_id)
            elif cmd == 'get-stats' and video_id:
                result = get_video_stats(video_id)
            else:
                result = "❌ Invalid command or missing parameters"
            
            with open('/tmp/youtube_result.md', 'w') as f:
                f.write(result)
            print(result)
        EOF
          
          python /tmp/youtube_integration.py
          echo "youtube_result<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/youtube_result.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Install OpenCode CLI
        run: |
          curl -fsSL https://opencode.ai/install | bash
          echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Extract clean prompt
        id: extract-prompt
        env:
          RAW_PROMPT: ${{ github.event_name == 'workflow_dispatch' && inputs.prompt || github.event.comment.body }}
        run: |
          # Check if this is a YouTube command
          if echo "$RAW_PROMPT" | grep -qi '/youtube'; then
            CLEAN_PROMPT="YouTube API operation completed. ${{ steps.youtube.outputs.youtube_result }}"
          else
            # Remove command prefixes for OpenCode
            CLEAN_PROMPT=$(echo "$RAW_PROMPT" | sed -E 's/.*\/(oc|opencode)[[:space:]]*//i' | sed -E 's/<[^>]*>//g' | head -1)
            if [ -z "$CLEAN_PROMPT" ]; then
              CLEAN_PROMPT="Please analyze this issue or pull request"
            fi
          fi
          echo "clean_prompt=$CLEAN_PROMPT" >> $GITHUB_OUTPUT

      - name: Run OpenCode
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          opencode run "${{ steps.extract-prompt.outputs.clean_prompt }}" --model opencode/gpt-4o-mini

      - name: Post YouTube results as comment
        if: steps.youtube.outputs.youtube_result != ''
        uses: actions/github-script@v7
        with:
          script: |
            const result = `${{ steps.youtube.outputs.youtube_result }}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: result
            });