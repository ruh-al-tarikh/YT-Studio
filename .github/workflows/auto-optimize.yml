name: 🖼️ Auto-Optimize Assets

on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  optimize:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Optimize Images
        run: |
          sudo apt-get update
          sudo apt-get install -y optipng jpegoptim
          
          find . -name "*.png" -type f -exec optipng -o7 {} \; 2>/dev/null || true
          find . -name "*.jpg" -o -name "*.jpeg" -type f -exec jpegoptim --strip-all {} \; 2>/dev/null || true
          
      - name: Check for Changes
        id: git-check
        run: |
          git add -A
          if ! git diff --cached --quiet; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi
          
      - name: Create PR
        if: steps.git-check.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "🖼️ Optimize images and assets"
          title: "🤖 Asset Optimization"
          body: "Weekly asset optimization completed."
          branch: auto-optimize/assets
          base: main
