name = "yt-studio"
main = "src/worker.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./public"
binding = "ASSETS"

[env.development]
vars = { 
  ENVIRONMENT = "development",
  API_URL = "http://localhost:8787"
}

[env.production]
vars = { 
  ENVIRONMENT = "production",
  API_URL = "https://yt-studio-api.ruhdevopsytstudio.workers.dev"
}

[[d1_databases]]
binding = "MY_DB"
database_name = "yt-studio-db"
database_id = "e36d3eba-7401-4945-b8e8-26cdbd13e3a9"
