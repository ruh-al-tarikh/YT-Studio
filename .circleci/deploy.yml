# CircleCI Deployment Configuration for YT-Studio
# Generated automatically - do not manually edit unless necessary

version: 2.1

# Reusable commands
commands:
  setup-node-pnpm:
    description: "Install Node.js and pnpm"
    steps:
      - run:
          name: Install Node.js 20
          command: |
            curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
            sudo apt-get install -y nodejs
      - run:
          name: Install pnpm
          command: sudo npm install -g pnpm
      - run:
          name: Install dependencies
          command: pnpm install --frozen-lockfile

  setup-firebase:
    description: "Install Firebase CLI and dependencies"
    steps:
      - run:
          name: Install Firebase CLI
          command: sudo npm install -g firebase-tools
      - run:
          name: Install Java 21 (for emulators)
          command: |
            sudo apt-get update
            sudo apt-get install -y openjdk-21-jre-headless
      - run:
          name: Verify Java version
          command: java -version

  persist-workspace:
    description: "Save build artifacts for later jobs"
    steps:
      - persist_to_workspace:
          root: ~/project
          paths:
            - functions/lib
            - public
            - .firebase
            - package.json

  attach-workspace:
    description: "Restore build artifacts"
    steps:
      - attach_workspace:
          at: ~/project

# Jobs
jobs:
  lint:
    docker:
      - image: cimg/node:20.18
    steps:
      - checkout
      - setup-node-pnpm
      - run:
          name: ESLint check
          command: |
            cd functions
            npm run lint -- --max-warnings 0
      - run:
          name: TypeScript type check
          command: |
            cd functions
            npx tsc --noEmit
      - run:
          name: Quality GC check
          command: npx quality-gc run

  build:
    docker:
      - image: cimg/node:20.18
    steps:
      - checkout
      - setup-node-pnpm
      - run:
          name: Build Firebase Functions
          command: |
            cd functions
            npm run build
      - run:
          name: List built files
          command: ls -la functions/lib/
      - persist-workspace

  test:
    docker:
      - image: cimg/node:20.18
    steps:
      - checkout
      - setup-node-pnpm
      - run:
          name: Run unit tests
          command: |
            cd functions
            npm test || echo "No tests defined"
      - run:
          name: Run integration tests (emulators)
          command: |
            npx firebase emulators:exec --only firestore,auth "npm run test:integration" || echo "Integration tests skipped"

  deploy-preview:
    docker:
      - image: cimg/node:20.18
    steps:
      - checkout
      - setup-node-pnpm
      - setup-firebase
      - attach-workspace
      - run:
          name: Deploy to Firebase Preview Channel
          command: |
            CHANNEL_NAME=$(echo "$CIRCLE_BRANCH" | tr '/' '-' | tr '[:upper:]' '[:lower:]' | cut -c1-20)
            firebase hosting:channel:deploy "$CHANNEL_NAME" --expires 7d --only hosting
            echo "Preview URL: https://$CHANNEL_NAME--ytstudio-pr.web.app"
          environment:
            FIREBASE_TOKEN: $FIREBASE_TOKEN

  deploy-production:
    docker:
      - image: cimg/node:20.18
    steps:
      - checkout
      - setup-node-pnpm
      - setup-firebase
      - attach-workspace
      - run:
          name: Deploy to Firebase Production
          command: |
            firebase deploy --only functions,hosting --non-interactive --force
          environment:
            FIREBASE_TOKEN: $FIREBASE_TOKEN

  notify:
    docker:
      - image: cimg/base:stable
    steps:
      - run:
          name: Notify on failure
          command: |
            echo "Build failed for $CIRCLE_BRANCH" | curl -X POST -H "Content-Type: application/json" -d "{\"content\": \"$(cat)\"}" $WEBHOOK_URL
          when: on_fail

# Workflows
workflows:
  version: 2

  # Workflow for all branches (CI)
  ci:
    jobs:
      - lint
      - build:
          requires:
            - lint
      - test:
          requires:
            - build
      - deploy-preview:
          requires:
            - test
          filters:
            branches:
              ignore: main
      - notify:
          requires:
            - deploy-preview
          filters:
            branches:
              ignore: main

  # Workflow for main branch (CD)
  cd:
    jobs:
      - lint:
          filters:
            branches:
              only: main
      - build:
          requires:
            - lint
          filters:
            branches:
              only: main
      - test:
          requires:
            - build
          filters:
            branches:
              only: main
      - deploy-production:
          requires:
            - test
          filters:
            branches:
              only: main
      - notify:
          requires:
            - deploy-production
          filters:
            branches:
              only: main
          when: on_fail

