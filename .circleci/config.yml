version: 2.1

jobs:
  python-checks:
    docker:
      - image: cimg/python:3.12
    steps:
      - checkout
      - run:
          name: Install Python tools
          command: |
            pip install --user ruff mypy pytest pytest-cov
            echo 'export PATH="$HOME/.local/bin:$PATH"' >> $BASH_ENV
      - run:
          name: Run Ruff linter and formatter
          command: |
            ruff check . --fix
            ruff format .
      - run:
          name: Run MyPy type checker
          command: mypy . || echo "MyPy found issues but continuing"
      - run:
          name: Run pytest
          command: pytest || echo "No tests found"

  node-checks:
    docker:
      - image: cimg/node:20.18
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: |
            sudo npm install -g pnpm
            pnpm install --frozen-lockfile
      - run:
          name: Run linting
          command: |
            cd functions
            npm run lint -- --max-warnings 0
      - run:
          name: TypeScript type check
          command: |
            cd functions
            npx tsc --noEmit
      - run:
          name: Quality GC check
          command: npx quality-gc run || echo "Quality GC issues found"

workflows:
  version: 2
  validate:
    jobs:
      - python-checks
      - node-checks
