version: 2.1

jobs:
  python-checks:
    docker:
      - image: cimg/python:3.12
    steps:
      - checkout
      - run:
          name: Install UV
          command: curl -LsSf https://astral.sh/uv/install.sh | sh
      - run:
          name: Install dependencies
          command: uv pip install -r requirements-dev.txt
      - run:
          name: Run Ruff
          command: ruff check . --fix && ruff format .
      - run:
          name: Run MyPy
          command: mypy .
      - run:
          name: Run tests
          command: pytest

  node-checks:
    docker:
      - image: cimg/node:20
    steps:
      - checkout
      - run:
          name: Install pnpm
          command: npm install -g pnpm
      - run:
          name: Install dependencies
          command: pnpm install --frozen-lockfile
      - run:
          name: Run lint
          command: pnpm lint
      - run:
          name: Run type check
          command: pnpm type-check
      - run:
          name: Run tests
          command: pnpm test

workflows:
  version: 2
  main:
    jobs:
      - python-checks
      - node-checks
