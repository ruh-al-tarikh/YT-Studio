# .circleci/config.yml
version: 2.1

# Define reusable commands
commands:
  setup-node:
    steps:
      - checkout
      - run:
          name: Install Node.js
          command: |
            curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
            sudo apt-get install -y nodejs
      - run:
          name: Install pnpm
          command: |
            npm install -g pnpm
      - run:
          name: Install dependencies
          command: |
            pnpm install
          working_directory: ~/project

  setup-firebase:
    steps:
      - run:
          name: Install Firebase CLI
          command: |
            npm install -g firebase-tools
      - run:
          name: Install Java for Firebase Emulators
          command: |
            sudo apt-get update
            sudo apt-get install -y openjdk-21-jre-headless

# Define jobs
jobs:
  lint-and-test:
    docker:
      - image: cimg/node:20.18
    steps:
      - setup-node
      - run:
          name: Run ESLint
          command: |
            cd functions
            npm run lint -- --max-warnings 0
      - run:
          name: Run TypeScript type check
          command: |
            cd functions
            npx tsc --noEmit
      - run:
          name: Run quality-gc
          command: |
            npx quality-gc run

  build-functions:
    docker:
      - image: cimg/node:20.18
    steps:
      - setup-node
      - run:
          name: Build TypeScript functions
          command: |
            cd functions
            npm run build
      - run:
          name: List built files
          command: |
            ls -la functions/lib/

  deploy-firebase-preview:
    docker:
      - image: cimg/node:20.18
    steps:
      - setup-node
      - setup-firebase
      - run:
          name: Deploy to Firebase Preview Channel
          command: |
            # Generate preview channel name from branch
            CHANNEL_NAME=$(echo $CIRCLE_BRANCH | tr '/' '-' | tr '[:upper:]' '[:lower:]' | cut -c1-20)
            firebase hosting:channel:deploy $CHANNEL_NAME --expires 7d
          environment:
            FIREBASE_TOKEN: $FIREBASE_TOKEN

  deploy-production:
    docker:
      - image: cimg/node:20.18
    steps:
      - setup-node
      - setup-firebase
      - run:
          name: Build functions
          command: |
            cd functions
            npm run build
      - run:
          name: Deploy to Firebase Production
          command: |
            firebase deploy --only functions,hosting --force
          environment:
            FIREBASE_TOKEN: $FIREBASE_TOKEN

  deploy-docker:
    docker:
      - image: cimg/node:20.18
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: Build Docker image
          command: |
            docker build -t yt-studio:$CIRCLE_SHA1 .
            docker tag yt-studio:$CIRCLE_SHA1 yt-studio:latest
      - run:
          name: Push to GHCR (optional)
          command: |
            echo $GHCR_TOKEN | docker login ghcr.io -u $CIRCLE_PROJECT_USERNAME --password-stdin
            docker tag yt-studio:$CIRCLE_SHA1 ghcr.io/ruhdevops/yt-studio:$CIRCLE_SHA1
            docker push ghcr.io/ruhdevops/yt-studio:$CIRCLE_SHA1
          no_output_timeout: 20m

  create-github-release:
    docker:
      - image: cimg/node:20.18
    steps:
      - checkout
      - run:
          name: Create GitHub Release
          command: |
            VERSION="v$(date +'%Y.%m.%d')-${CIRCLE_SHA1:0:7}"
            gh release create $VERSION \
              --title "Release $VERSION" \
              --notes "Auto-generated from CircleCI build $CIRCLE_BUILD_NUM"
          environment:
            GITHUB_TOKEN: $GITHUB_TOKEN

# Define workflows
workflows:
  version: 2

  # Workflow 1: On every commit to any branch
  validate:
    jobs:
      - lint-and-test
      - build-functions

  # Workflow 2: On PR to main - preview deployment
  preview:
    jobs:
      - lint-and-test
      - build-functions
      - deploy-firebase-preview:
          requires:
            - lint-and-test
            - build-functions
          filters:
            branches:
              ignore: main
      - deploy-docker:
          requires:
            - lint-and-test
            - build-functions
          filters:
            branches:
              ignore: main

  # Workflow 3: On push to main - production deployment
  production:
    jobs:
      - lint-and-test:
          filters:
            branches:
              only: main
      - build-functions:
          filters:
            branches:
              only: main
      - deploy-production:
          requires:
            - lint-and-test
            - build-functions
          filters:
            branches:
              only: main
      - deploy-docker:
          requires:
            - lint-and-test
            - build-functions
          filters:
            branches:
              only: main
      - create-github-release:
          requires:
            - deploy-production
            - deploy-docker
          filters:
            branches:
              only: main

  # Workflow 4: Nightly scheduled tests
  nightly:
    triggers:
      - schedule:
          cron: "0 0 * * *"
          filters:
            branches:
              only: main
    jobs:
      - lint-and-test
      - build-functions
